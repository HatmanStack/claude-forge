name: Evaluation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  # Tier A — deterministic structural contracts. Fast, no LLM, no network.
  # Runs on every push/PR: the regression net for agent frontmatter, tool
  # policy, wiring, and manifest consistency.
  tier-a-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install test deps
        run: python -m pip install --quiet pytest
      - name: Run Tier A contract checks
        run: python -m pytest evaluation/tier_a_contracts -v --tb=short --junitxml=eval_results/tier_a.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: tier-a-results
          path: eval_results/tier_a.xml

  # Tier C — trajectory validators against synthetic legal/illegal runs. The
  # same validators run against real trace-summary.json artifacts via
  # evaluation/check_run.py in nightly / pre-release jobs.
  tier-c-trajectory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Install test deps
        run: python -m pip install --quiet pytest
      - name: Run Tier C trajectory checks
        run: python -m pytest evaluation/tier_c_trajectory -v --tb=short --junitxml=eval_results/tier_c.xml
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: tier-c-results
          path: eval_results/tier_c.xml
